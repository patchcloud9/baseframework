# Docker Compose configuration for Base Framework
# Copy your docker-compose configuration here

# View all logs
# docker logs <container_name>



services:
  baseframework:
    image: php:apache
    container_name: baseframework
    restart: unless-stopped
    environment:
      # Add environment variables as needed
      - APP_ENV=development
      - APP_DEBUG=true
    volumes:
      # Main application code
      - /srv/docker_data/baseframework/var_www_html:/var/www/html
      # Custom entrypoint script
      - /srv/docker_data/baseframework/entrypoint/entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/custom-entrypoint.sh"]
    networks:
      - frontend
      - backend

networks:
  frontend:
    name: bridge_frontend
    external: true
  backend:
    name: bridge_backend
    external: true